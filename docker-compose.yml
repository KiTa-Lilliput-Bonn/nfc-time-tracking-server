# NFC Time Tracking Server — Docker mit persistenten Volumes.
# Image nach Release: ghcr.io/waynenani/nfc-time-tracking-server:<tag>
# Lokal bauen: docker compose build

services:
  nfc-time-tracking:
    image: ghcr.io/waynenani/nfc-time-tracking-server:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      # Im Image voreingestellt; bei Bedarf überschreiben:
      NFC_BACKUP_TARGET_PATH: /backup
      # NFC_AUTH_JWT_SECRET: "..."
      # NFC_SERVER_PORT: "8080"
    volumes:
      - nfc-data:/data
      - nfc-backup:/backup
    restart: unless-stopped

volumes:
  nfc-data:
  nfc-backup:
