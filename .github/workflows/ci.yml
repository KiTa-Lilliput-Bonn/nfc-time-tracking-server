# Push/PR auf main: Go-Tests und Frontend-Build (vue-tsc + Vite).
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-ci-go-${{ hashFiles('go.sum', 'go.mod') }}
          restore-keys: |
            ${{ runner.os }}-ci-go-

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Frontend build (Go embed)
        run: |
          set -eux
          cd web
          npm ci
          npm run build
          cd ..
          make sync-web-dist

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go tests
        run: go test ./...
